<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receptionist for Auto Repair Shops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red: #dc2626;
            --red-dark: #991b1b;
            --yellow: #f59e0b;
            --dark: #0f172a;
            --gray: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: white;
            color: var(--dark);
            line-height: 1.5;
        }
        
        .flyer {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            background: linear-gradient(180deg, #fef9c3 0%, #fff 30%);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--red);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
        }
        
        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 5px;
        }
        
        h1 span {
            color: var(--red);
        }
        
        .tagline {
            font-size: 1.1rem;
            color: var(--gray);
            font-weight: 500;
        }
        
        .problem-box {
            background: var(--dark);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .problem-box h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--yellow);
        }
        
        .problem-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            text-align: center;
        }
        
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--yellow);
        }
        
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .solution {
            margin-bottom: 30px;
        }
        
        .solution h2 {
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .feature {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid var(--red);
        }
        
        .feature-icon {
            font-size: 1.3rem;
        }
        
        .feature h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 3px;
        }
        
        .feature p {
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .revenue {
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .revenue h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        
        .revenue-amount {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .revenue-note {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .pricing {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .price-card {
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }
        
        .price-card.highlight {
            border-color: var(--red);
            background: #fef9c3;
        }
        
        .price-card h3 {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 10px;
        }
        
        .price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--dark);
        }
        
        .price span {
            font-size: 1rem;
            font-weight: 400;
        }
        
        .cta {
            text-align: center;
            padding: 30px;
            background: var(--dark);
            border-radius: 15px;
            color: white;
        }
        
        .cta h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .cta p {
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .cta-button {
            display: inline-block;
            background: var(--red);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
        }
        
        .contact-info {
            margin-top: 20px;
            font-size: 1rem;
        }
